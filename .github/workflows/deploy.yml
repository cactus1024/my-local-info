name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 22 * * *' # 매일 한국시간 오전 7시 (장 시작 전 미 증시 브리핑)
    - cron: '0 7 * * *'  # 매일 한국시간 오후 4시 (장 마감 후 국장 브리핑)
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run scripts (only for schedule/manual)
        if: github.event_name != 'push'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 안 쓰는 PUBLIC_DATA_API_KEY는 깔끔하게 제거했습니다.
        run: |
          node scripts/fetch-market-data.js
          node scripts/generate-blog-post.js

      - name: Commit and Push changes
        if: github.event_name != 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || (git commit -m "자동 업데이트: 글로벌 매크로 및 증시 브리핑 생성" && git push)

      - name: Build project
        run: npm run build

      - name: Deploy to Cloudflare Pages
        # 주의: 클라우드플레어 프로젝트 이름은 연결 유지를 위해 기존(my-local-info) 그대로 두었습니다.
        run: npx wrangler pages deploy out --project-name=my-local-info
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
